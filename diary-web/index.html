<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nhật Ký Đôi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-blur"></div>
  <main class="container">
    <section id="loginCard" class="card active">
      <h1>📔 Nhật Ký Đôi</h1>
      <p class="subtitle">Không gian riêng cho 2 người cùng chia sẻ cảm xúc mỗi ngày.</p>
      <form id="loginForm" class="form">
        <label for="username">Tài khoản</label>
        <input id="username" type="text" placeholder="Nhập tài khoản" required />

        <label for="password">Mật khẩu</label>
        <input id="password" type="password" placeholder="Nhập mật khẩu" required />

        <button type="submit" class="btn primary">Đăng nhập</button>
      </form>
      <p class="hint">Demo: <b>minh</b>/<b>123456</b> hoặc <b>an</b>/<b>123456</b></p>
      <p id="loginMessage" class="message"></p>
    </section>

    <section id="diaryCard" class="card hidden">
      <header class="toolbar">
        <div>
          <h2>Xin chào, <span id="displayName"></span> 👋</h2>
          <p>Hãy viết điều bạn muốn người kia đọc hôm nay.</p>
        </div>
        <button id="logoutBtn" class="btn ghost">Đăng xuất</button>
      </header>

      <form id="entryForm" class="form">
        <label for="entryTitle">Tiêu đề nhật ký</label>
        <input id="entryTitle" type="text" placeholder="Ví dụ: Hôm nay của mình..." required />

        <label for="entryContent">Nội dung</label>
        <textarea id="entryContent" rows="5" placeholder="Viết cảm xúc, suy nghĩ hoặc lời nhắn cho người ấy..." required></textarea>

        <button type="submit" class="btn primary">Lưu nhật ký</button>
      </form>

      <div class="list-header">
        <h3>📚 Dòng thời gian chung</h3>
        <small>Hiển thị đầy đủ ngày & giờ</small>
      </div>
      <div id="entries" class="entries"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
